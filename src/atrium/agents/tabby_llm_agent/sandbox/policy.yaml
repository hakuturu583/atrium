# OpenShell network/permission policy for the TabbyLLMAgent sandbox.
#
# Security envelope: this container has GPUs and runs an LLM. It must NOT be able
# to reach the public internet (WAN) — even under prompt injection — but it must
# be able to talk to the Atrium control plane and sibling agents over the
# host-local container LAN via A2A.
#
# Exact schema may vary with the installed OpenShell version; pin/adjust as
# needed and reference via SandboxConfig.policy_path.
version: 1

network:
  # Deny egress by default; only explicitly-allowed host-local ranges pass.
  default_egress: deny
  allow:
    - cidr: 127.0.0.0/8     # loopback (tabbyAPI <-> bridge inside the container)
    - cidr: 10.0.0.0/8      # host-local container LAN / control plane (A2A)
    - cidr: 172.16.0.0/12   # docker/podman bridge ranges
  deny:
    - cidr: 0.0.0.0/0       # everything else, i.e. the public internet

filesystem:
  read_only_root: true
  writable:
    - /workspace
    - /tmp
    - /models           # EXL3 quantized weights (mounted read-only in practice)

process:
  no_new_privileges: true
  drop_capabilities:
    - ALL

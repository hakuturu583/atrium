# OpenShell sandbox policy for code-workspace sandboxes.
#
# Security envelope — deliberately DIFFERENT from the inference/builder agents.
# Those are WAN-isolated; a code workspace cannot be, because its whole job is to
# pull dependencies, fetch repos and **push code to GitHub via `gh`**, all of
# which need public-internet egress. So egress is *allowed* here — but as an
# explicit L7 allow-list (GitHub + the Python package registries), not a blanket
# `0.0.0.0/0`. The rest of the isolation is kept: a non-root user (`process`), a
# Landlock-enforced filesystem with a small set of writable scratch areas
# (`filesystem_policy`), and — enforced in code (see
# CodeWorkSpaceAgent._enforce_workspace_policy) — no Docker socket and no GPU.
#
# This file is the package-internal source of truth for that envelope; it is
# referenced via SandboxConfig.policy_path (see sandbox/config.py). It targets
# the OpenShell CLI policy schema (version 1): the static `filesystem_policy` /
# `landlock` / `process` sections are locked at sandbox creation, while
# `network_policies` is a hot-reloadable, default-deny allow-list. Exact schema
# may vary with the installed OpenShell version; pin/adjust as needed.
version: 1

# Static: locked at sandbox creation. Any path not listed is inaccessible;
# `include_workdir: true` also adds the sandbox workdir (/workspace) to read_write.
filesystem_policy:
  include_workdir: true
  read_only: [/usr, /lib, /proc, /dev/urandom, /app, /etc, /var/log]
  read_write:
    - /workspace          # the project tree (clone target, staged files, builds)
    - /sandbox            # OpenShell's default home/scratch for the sandbox user
    - /home/sandbox       # git/gh config, package-manager caches, venvs
    - /tmp
    - /dev/null

# Static: highest Landlock ABI the host supports; skip missing paths rather than
# failing the whole ruleset (see the workdir/home paths that may not exist yet).
landlock:
  compatibility: best_effort

# Static: unprivileged identity for the agent process (root is rejected). Combined
# with the (code-enforced) absence of any docker.sock mount, the workspace can
# never reach the host Docker daemon or run privileged.
process:
  run_as_user: sandbox
  run_as_group: sandbox

# Dynamic: default-deny egress allow-list. A connection is permitted only when
# both the destination endpoint and the calling binary match an entry in the
# same block. `access: full` permits all HTTP methods (needed for `git push` /
# opening PRs); tighten to `read-only` for fetch-only deployments.
network_policies:
  github:
    name: github
    endpoints:
      - { host: github.com, port: 443, protocol: rest, enforcement: enforce, access: full }
      - { host: api.github.com, port: 443, protocol: rest, enforcement: enforce, access: full }
      - { host: codeload.github.com, port: 443, protocol: rest, enforcement: enforce, access: full }
      - { host: objects.githubusercontent.com, port: 443, protocol: rest, enforcement: enforce, access: full }
      - { host: raw.githubusercontent.com, port: 443, protocol: rest, enforcement: enforce, access: full }
    binaries:
      - { path: /usr/bin/git }
      - { path: /usr/local/bin/git }
      - { path: /usr/lib/git-core/git-remote-http }
      - { path: /usr/lib/git-core/git-remote-https }
      - { path: /usr/bin/gh }
      - { path: /usr/local/bin/gh }
      - { path: /usr/bin/curl }
      - { path: /usr/local/bin/curl }
  python_packages:
    name: python-packages
    endpoints:
      - { host: pypi.org, port: 443, protocol: rest, enforcement: enforce, access: read-only }
      - { host: files.pythonhosted.org, port: 443, protocol: rest, enforcement: enforce, access: read-only }
    binaries:
      - { path: /usr/bin/python }
      - { path: /usr/bin/python3 }
      - { path: /usr/local/bin/python }
      - { path: /usr/local/bin/python3 }
      - { path: /usr/bin/pip }
      - { path: /usr/bin/pip3 }
      - { path: /usr/bin/uv }
      - { path: /usr/local/bin/uv }
      - { path: /root/.local/bin/uv }
      - { path: /usr/bin/curl }
